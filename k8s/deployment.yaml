apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: claude-credentials
  namespace: orca-hub
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orca-hub
  namespace: orca-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orca-hub
  template:
    metadata:
      labels:
        app: orca-hub
    spec:
      serviceAccountName: orca-hub
      initContainers:
        # Copy kubectl into a shared volume so the main container can use it
        # without modifying the image
        - name: install-kubectl
          image: bitnami/kubectl:latest
          command: ["cp", "/opt/bitnami/kubectl/bin/kubectl", "/kubectl-bin/kubectl"]
          volumeMounts:
            - name: kubectl-bin
              mountPath: /kubectl-bin
      containers:
        - name: orca-hub
          image: 10.43.148.117:5000/orca-hub:latest
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: orca-hub-secrets
          ports:
            - containerPort: 4000
          readinessProbe:
            httpGet:
              path: /healthz
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: claude-credentials
              mountPath: /home/orca/.claude
            - name: kubectl-bin
              mountPath: /usr/local/bin/kubectl
              subPath: kubectl
      volumes:
        - name: claude-credentials
          persistentVolumeClaim:
            claimName: claude-credentials
        - name: kubectl-bin
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: orca-hub
  namespace: orca-hub
spec:
  type: NodePort
  selector:
    app: orca-hub
  ports:
    - port: 4000
      targetPort: 4000
      nodePort: 30400
