apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: orca-hub
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: orca-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17
          env:
            - name: POSTGRES_USER
              value: orca_hub
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: orca-hub-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: orca_hub
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "orca_hub"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: orca-hub
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
