services:
  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PORT:-4000}:4000"
    environment:
      DATABASE_URL: ecto://orca_hub:postgres@db/orca_hub
      # SECRET_KEY_BASE: <set to override auto-generated key>
      PHX_HOST: ${PHX_HOST:-localhost}
      PHX_URL_PORT: ${PHX_URL_PORT:-${PORT:-4000}}
      # Optional: title generation
      # OPENAI_API_KEY: ${OPENAI_API_KEY}
      DATAROBOT_API_TOKEN: ${DATAROBOT_API_TOKEN}
      DATAROBOT_ENDPOINT: ${DATAROBOT_ENDPOINT}
      TITLE_MODEL: ${TITLE_MODEL}
    volumes:
      - claude_credentials:/home/orca/.claude
      # Mount your project directories here (paths must be absolute), e.g.:
      # - /home/user/projects/my-app:/home/orca/projects/my-app
      # - /home/user/work:/home/orca/projects/work
    restart: unless-stopped

  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: orca_hub
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orca_hub
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orca_hub"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
  claude_credentials:
